<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant/30 docked full-width top-0 z-50">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-6 max-w-container-max mx-auto gap-6 md:gap-0">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-tight">Gourmet Artisanal</h1>
<nav aria-label="Registration Progress" class="hidden md:flex flex-row gap-8">
<!-- Step 1: Completed -->
<div class="flex items-center gap-2 text-on-surface-variant opacity-50">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md">Profile Type</span>
</div>
<div class="w-8 border-t border-outline-variant/50 my-auto"></div>
<!-- Step 2: Active -->
<div class="flex items-center gap-2 text-primary border-b-2 border-primary font-bold pb-1">
<span class="material-symbols-outlined text-xl">looks_two</span>
<span class="font-label-md text-label-md">Basic Data</span>
</div>
<div class="w-8 border-t border-outline-variant/50 my-auto"></div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-2 text-on-surface-variant opacity-50">
<span class="material-symbols-outlined text-xl">looks_3</span>
<span class="font-label-md text-label-md">Producer Details</span>
</div>
<div class="w-8 border-t border-outline-variant/50 my-auto"></div>
<!-- Step 4: Pending -->
<div class="flex items-center gap-2 text-on-surface-variant opacity-50">
<span class="material-symbols-outlined text-xl">looks_4</span>
<span class="font-label-md text-label-md">Finish</span>
</div>
</nav>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center py-16 px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-2xl bg-surface-container-lowest p-8 md:p-16 rounded-xl border border-outline-variant/20 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)]">
<div class="mb-12 text-center">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-4">Tus datos</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Por favor, confirma tu información básica para continuar.</p>
</div>
<form class="space-y-8 flex flex-col">
<!-- Nombre Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="nombre">Nombre</label>
<input class="bg-transparent border-0 border-b border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-3 font-body-lg text-body-lg text-on-surface transition-colors duration-300" id="nombre" name="nombre" type="text" value="Usuario Ejemplo"/>
</div>
<!-- Correo Electrónico Field (Read-only) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/50 px-0 py-3 font-body-lg text-body-lg text-on-surface-variant opacity-70 cursor-not-allowed pr-10" id="email" name="email" readonly="" type="email" value="usuario@ejemplo.com"/>
<div class="absolute right-0 top-1/2 -translate-y-1/2 flex items-center gap-1 text-secondary">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="font-label-sm text-label-sm hidden sm:inline">Verificado</span>
</div>
</div>
</div>
<!-- Consent Checkbox -->
<div class="pt-6">
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center justify-center w-6 h-6 mt-0.5">
<input class="peer appearance-none w-5 h-5 border border-outline-variant rounded-sm checked:bg-primary checked:border-primary transition-all focus:ring-2 focus:ring-primary/20 focus:outline-none" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-sm opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                            He leído y acepto la <a class="text-primary-container hover:text-primary transition-colors underline underline-offset-4 decoration-primary-container/30 hover:decoration-primary" href="#">política de privacidad</a> y los <a class="text-primary-container hover:text-primary transition-colors underline underline-offset-4 decoration-primary-container/30 hover:decoration-primary" href="#">términos y condiciones</a>.
                        </span>
</label>
</div>
</form>
</div>
</main>
<!-- Footer Navigation -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-6 md:py-8 bg-surface/95 backdrop-blur-sm border-t border-outline-variant/30">
<button class="border border-on-surface text-on-surface px-8 py-3 rounded-DEFAULT font-label-md text-label-md hover:bg-surface-variant transition-all scale-95 active:scale-90" type="button">
            Back
        </button>
<div class="hidden md:block font-label-sm text-label-sm text-on-surface-variant tracking-widest uppercase">
            Step 2 of 4
        </div>
<button class="bg-primary-container text-on-primary-container px-8 py-3 rounded-DEFAULT font-label-md text-label-md hover:bg-primary hover:text-on-primary transition-all scale-95 active:scale-90 flex items-center gap-2 group" type="button">
            Continue
            <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>
<!-- Spacer for fixed footer -->
<div class="h-24 md:h-32"></div>
</body></html>
